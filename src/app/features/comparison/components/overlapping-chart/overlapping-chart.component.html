<div class="chart-wrapper">
  @if (legendItems().length > 0) {
    <div class="chart-legend">
      @for (item of legendItems(); track item.symbol) {
        <div class="chart-legend__item">
          <span class="chart-legend__color" [style.background-color]="item.color"></span>
          <span class="chart-legend__label">{{ item.symbol }}</span>
        </div>
      }
    </div>
  }

  @if (loading()) {
    <div class="loading-overlay">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  }

  <div class="chart-container" #chartContainerRef></div>

  @if (error()) {
    <div class="error-state">
      {{ error() }}
    </div>
  }
</div>
