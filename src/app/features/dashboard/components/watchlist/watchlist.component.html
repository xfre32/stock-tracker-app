@if (store.isEmpty()) {
  <app-empty-state
    icon="visibility"
    title="Your watchlist is empty"
    message="Search for a stock symbol above and start tracking your favorite stocks."
  />
} @else {
  <div class="watchlist-grid">
    @for (item of store.items(); track item.symbol) {
      <app-stock-card
        [item]="item"
        (remove)="store.removeStock($event)"
        (viewDetails)="onViewDetails($event)"
      />
    }
    @for (symbol of loadingSymbols(); track symbol) {
      <app-skeleton-card />
    }
  </div>
}
