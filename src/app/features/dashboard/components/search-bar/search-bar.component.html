<div class="search-bar">
      <mat-form-field appearance="outline" class="search-bar__field">
        <mat-label>Stock Symbol</mat-label>
        <input matInput
               [(ngModel)]="searchValue"
               placeholder="e.g. AAPL, GOOGL, TSLA"
               (keydown.enter)="onSubmit()"
               class="search-bar__input">
        <mat-icon matPrefix>search</mat-icon>
      </mat-form-field>

      <button mat-flat-button color="primary" (click)="onSubmit()" class="search-bar__button">
        <mat-icon>add</mat-icon>
        Track Stock
      </button>
    </div>
