<section class="dashboard">
  <div class="dashboard__hero">
    <h1 class="dashboard__title">Stock Tracker</h1>
    <p class="dashboard__subtitle">Track your favorite stocks in real time</p>
  </div>

  <app-search-bar (searchSubmitted)="store.addStock($event)" />

  <div class="dashboard__summary">
    @if (store.count() > 0) {
      <div class="summary-container">
        <p class="dashboard__count">
          Your watchlist has <strong>{{ store.count() }}</strong> item{{
            store.count() !== 1 ? "s" : ""
          }}
        </p>
        <button
          mat-icon-button
          color="primary"
          (click)="exportToCsv()"
          matTooltip="Export to CSV"
          aria-label="Export watchlist to CSV"
        >
          <mat-icon>download</mat-icon>
        </button>
      </div>
    }
  </div>

  <app-watchlist />
</section>
