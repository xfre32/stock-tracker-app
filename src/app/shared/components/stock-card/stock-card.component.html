<mat-card class="stock-card" appearance="outlined">
  <mat-card-header>
    <div class="stock-card__header">
      <div class="stock-card__identity">
        <mat-card-title class="stock-card__name">{{
          item().name
        }}</mat-card-title>
        <mat-chip class="stock-card__symbol">{{ item().symbol }}</mat-chip>
      </div>
      <button
        mat-icon-button
        (click)="remove.emit(item().symbol)"
        class="stock-card__remove"
        aria-label="Remove stock"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </mat-card-header>

  <mat-card-content class="stock-card__content">
    <div class="stock-card__price-section">
      <span class="stock-card__price price">{{
        item().currentPrice | currency: "USD"
      }}</span>
      <app-trend-indicator [value]="item().percentChange" />
    </div>

    <div class="stock-card__metrics">
      <div class="metric">
        <span class="metric__label">Open</span>
        <span class="metric__value price">{{
          item().openPrice | currency: "USD"
        }}</span>
      </div>
      <div class="metric">
        <span class="metric__label">High</span>
        <span class="metric__value price">{{
          item().highPrice | currency: "USD"
        }}</span>
      </div>
      <div class="metric">
        <span class="metric__label">Low</span>
        <span class="metric__value price">{{
          item().lowPrice | currency: "USD"
        }}</span>
      </div>
      <div class="metric">
        <span class="metric__label">Prev Close</span>
        <span class="metric__value price">{{
          item().previousClose | currency: "USD"
        }}</span>
      </div>
    </div>
  </mat-card-content>

  <mat-card-actions align="end">
    <button
      mat-button
      color="primary"
      (click)="viewDetails.emit(item().symbol)"
    >
      <mat-icon>open_in_new</mat-icon>
      View Details
    </button>
  </mat-card-actions>
</mat-card>
